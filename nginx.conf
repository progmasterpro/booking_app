events {}

http {
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=1r/s;
    server {
        # listen 443 ssl; для ssl сертификата
        location / {
            limit_req zone=mylimit;
            proxy_pass http:/booking_back:8000/;
        }
        ssl_sertificate # вводим адрес ;
        ssl_sertificate_key # вводим адрес ;
        include # вводим ;
        ssh_dhparam  # вводим ;
    }
}

